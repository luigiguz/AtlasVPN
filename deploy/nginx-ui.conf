server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # El API vive en otro host; si el JS aún llama a /api/* aquí, evita devolver index.html (login roto).
    location ^~ /api/ {
        default_type application/json;
        return 503 '{"error":"atlasvpn_ui","message":"Las rutas /api/* no se sirven desde la UI. Define ATLASVPN_PUBLIC_API_URL=https://api-atlas-vpn.verkku.com en el servicio atlasvpn-ui (runtime) o reconstruye con VITE_API_BASE_URL."}';
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
