# Plataforma Atlas (API + UI nginx). Túneles Cloudflare típicos:
#   https://atlas-ui.verkku.com      → localhost:8088 (UI; puerto host ATLAS_UI_PORT)
#   https://api-atlas-vpn.verkku.com → localhost:8765 (API)
#
# UI: ATLAS_PUBLIC_API_URL en atlas-ui (escribe /atlas-runtime-config.js).
# API: ATLAS_CORS_ORIGINS debe incluir el origen de la UI (https://atlas-ui.verkku.com).

name: atlas

services:
  atlas-api:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        CLOUDFLARED_VERSION: ${CLOUDFLARED_VERSION:-2026.5.0}
    image: ${ATLAS_API_IMAGE:-atlas-api}:${ATLAS_TAG:-latest}
    container_name: atlas-api
    restart: unless-stopped
    ports:
      - "${ATLAS_API_PORT:-8765}:8765"
    environment:
      TZ: ${TZ:-UTC}
      ATLAS_API_ONLY: "1"
      ATLAS_SESSION_SECRET: ${ATLAS_SESSION_SECRET:-}
      ATLAS_JWT_SECRET: ${ATLAS_JWT_SECRET:-}
      ATLAS_SECURE_COOKIES: ${ATLAS_SECURE_COOKIES:-0}
      ATLAS_SESSION_MAX_AGE: ${ATLAS_SESSION_MAX_AGE:-604800}
      ATLAS_DEFAULT_ADMIN_USERNAME: ${ATLAS_DEFAULT_ADMIN_USERNAME:-admin}
      ATLAS_DEFAULT_ADMIN_PASSWORD: ${ATLAS_DEFAULT_ADMIN_PASSWORD:-Atlas_Admin_Initial12}
      ATLAS_CORS_ORIGINS: ${ATLAS_CORS_ORIGINS:-https://atlas-ui.verkku.com,https://atlas-vpn.verkku.com,http://127.0.0.1:5173,http://localhost:5173}
    volumes:
      - atlas_settings:/app/.atlas
      - atlas_cloudflared:/app/.cloudflared-tunnels
      - ./scripts/tunnels.json:/app/scripts/tunnels.json:rw
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8765/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s

  atlas-ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
      args:
        VITE_API_BASE_URL: ${ATLAS_PUBLIC_API_URL:-}
    image: ${ATLAS_UI_IMAGE:-atlas-ui}:${ATLAS_TAG:-latest}
    container_name: atlas-ui
    restart: unless-stopped
    ports:
      - "${ATLAS_UI_PORT:-8088}:80"
    depends_on:
      atlas-api:
        condition: service_started
    environment:
      ATLAS_PUBLIC_API_URL: https://api-atlas-vpn.verkku.com
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  atlas_settings:
  atlas_cloudflared:
