# Plataforma Atlas (API + UI nginx). Túneles Cloudflare típicos:
#   https://atlas-ui.verkku.com      → localhost:8080 (UI)
#   https://api-atlas-vpn.verkku.com → localhost:8765 (API)
#
# UI: ATLASVPN_PUBLIC_API_URL en atlas-ui (escribe /atlasvpn-runtime-config.js).
# API: ATLASVPN_CORS_ORIGINS debe incluir el origen de la UI (https://atlas-ui.verkku.com).

name: atlas

services:
  atlas-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CLOUDFLARED_VERSION: ${CLOUDFLARED_VERSION:-2026.5.0}
    image: ${ATLAS_API_IMAGE:-atlas-api}:${ATLAS_TAG:-latest}
    container_name: atlas-api
    restart: unless-stopped
    ports:
      - "${ATLAS_API_PORT:-8765}:8765"
    environment:
      TZ: ${TZ:-UTC}
      ATLASVPN_API_ONLY: "1"
      ATLASVPN_SESSION_SECRET: ${ATLASVPN_SESSION_SECRET:-}
      ATLASVPN_JWT_SECRET: ${ATLASVPN_JWT_SECRET:-}
      ATLASVPN_SECURE_COOKIES: ${ATLASVPN_SECURE_COOKIES:-0}
      ATLASVPN_SESSION_MAX_AGE: ${ATLASVPN_SESSION_MAX_AGE:-604800}
      ATLASVPN_DEFAULT_ADMIN_USERNAME: ${ATLASVPN_DEFAULT_ADMIN_USERNAME:-admin}
      ATLASVPN_DEFAULT_ADMIN_PASSWORD: ${ATLASVPN_DEFAULT_ADMIN_PASSWORD:-}
      ATLASVPN_CORS_ORIGINS: ${ATLASVPN_CORS_ORIGINS:-https://atlas-ui.verkku.com,https://atlas-vpn.verkku.com,http://127.0.0.1:5173,http://localhost:5173}
    volumes:
      - atlas_settings:/app/.atlasvpn
      - atlas_cloudflared:/app/.cloudflared-tunnels
      - ./scripts/tunnels.json:/app/scripts/tunnels.json:rw
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8765/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s

  atlas-ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
      args:
        VITE_API_BASE_URL: ${ATLAS_PUBLIC_API_URL:-${ATLASVPN_PUBLIC_API_URL:-}}
    image: ${ATLAS_UI_IMAGE:-atlas-ui}:${ATLAS_TAG:-latest}
    container_name: atlas-ui
    restart: unless-stopped
    ports:
      - "${ATLAS_UI_PORT:-8080}:80"
    depends_on:
      atlas-api:
        condition: service_started
    environment:
      ATLASVPN_PUBLIC_API_URL: https://api-atlas-vpn.verkku.com
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  atlas_settings:
  atlas_cloudflared:
