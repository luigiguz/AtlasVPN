# Compila la imagen en el runner self-hosted (Linux ARM64) y despliega con Docker Compose

name: AtlasVPN — build y deploy (self-hosted)

on:
  push:
    branches: [main, master]
    paths:
      - "atlasvpn/**"
      - "ui/**"
      - "scripts/**"
      - "Logos/**"
      - "requirements.txt"
      - "Dockerfile"
      - "Dockerfile.ui"
      - "docker-entrypoint.sh"
      - "docker-compose.yml"
      - "deploy/**"
      - ".github/workflows/atlasvpn-selfhosted.yml"
  workflow_dispatch:
    inputs:
      no_cache:
        description: "docker compose build --no-cache"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: atlasvpn-selfhosted-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Build + Compose (RPi)
    runs-on:
      - self-hosted
      - Linux
      - ARM64

    env:
      COMPOSE_PROJECT_NAME: atlasvpn
      DOCKER_BUILDKIT: "1"
      ATLASVPN_API_IMAGE: atlasvpn-api
      ATLASVPN_UI_IMAGE: atlasvpn-ui
      ATLASVPN_TAG: ${{ github.sha }}
      ATLASVPN_PUBLIC_API_URL: http://127.0.0.1:8765

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Asegurar tunnels.json
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f scripts/tunnels.json ]]; then
            exit 0
          fi
          echo "Creando scripts/tunnels.json (no presente en el checkout)."
          if [[ -f scripts/tunnels.example.json ]]; then
            cp scripts/tunnels.example.json scripts/tunnels.json
          else
            echo "Aviso: falta scripts/tunnels.example.json; generando JSON mínimo."
            printf '%s\n' '{"meta":{"created_by":"github-actions"},"sites":{}}' > scripts/tunnels.json
          fi

      - name: Docker y Compose
        shell: bash
        run: |
          set -euo pipefail
          docker version
          docker compose version

      - name: Build imagen
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ inputs.no_cache }}" == "true" ]]; then
            docker compose -f docker-compose.yml build --no-cache --pull
          else
            docker compose -f docker-compose.yml build --pull
          fi

      - name: Etiquetar también como latest
        shell: bash
        run: |
          set -euo pipefail
          docker tag "${ATLASVPN_API_IMAGE}:${ATLASVPN_TAG}" "${ATLASVPN_API_IMAGE}:latest"
          docker tag "${ATLASVPN_UI_IMAGE}:${ATLASVPN_TAG}" "${ATLASVPN_UI_IMAGE}:latest"

      - name: Desplegar (Compose)
        shell: bash
        run: |
          set -euo pipefail
          docker compose -f docker-compose.yml up -d --remove-orphans

      - name: Estado
        shell: bash
        run: |
          set -euo pipefail
          docker compose -f docker-compose.yml ps
          docker compose -f docker-compose.yml images

      - name: Comprobar HTTP (local)
        shell: bash
        env:
          ATLASVPN_API_PORT: "8765"
          ATLASVPN_UI_PORT: "8080"
        run: |
          set -euo pipefail
          sleep 3
          api_url="http://127.0.0.1:${ATLASVPN_API_PORT}/api/health"
          ui_url="http://127.0.0.1:${ATLASVPN_UI_PORT}/"
          if command -v curl >/dev/null 2>&1; then
            api_code="$(curl -fsS -o /dev/null -w "%{http_code}" "$api_url" || true)"
            echo "API HTTP $api_code $api_url"
            [[ "$api_code" == "200" ]]
            ui_code="$(curl -fsS -o /dev/null -w "%{http_code}" "$ui_url" || true)"
            echo "UI HTTP $ui_code $ui_url"
            [[ "$ui_code" == "200" ]] || [[ "$ui_code" == "304" ]]
          elif command -v wget >/dev/null 2>&1; then
            wget -qO- "$api_url" >/dev/null
            wget -qO- "$ui_url" >/dev/null
          else
            echo "Aviso: sin curl ni wget en el runner; omitiendo comprobación HTTP."
          fi

      - name: Logs del servicio (solo si falló antes)
        if: failure()
        shell: bash
        run: docker compose -f docker-compose.yml logs --no-color --tail=80 atlasvpn-api atlasvpn-ui || true
