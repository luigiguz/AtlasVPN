# Compilación y comprobaciones en runners de GitHub (sin desplegar).
# Corre en PRs y en pushes a main y ramas feat/*.

name: CI — compilar UI y API

on:
  push:
    branches:
      - main
      - master
      - "feat/**"
    paths:
      - "atlasvpn/**"
      - "ui/**"
      - "scripts/**"
      - "Logos/**"
      - "requirements.txt"
      - "Dockerfile"
      - "Dockerfile.ui"
      - "docker-entrypoint.sh"
      - "docker-compose.yml"
      - "deploy/**"
      - ".github/workflows/**"
  pull_request:
    branches:
      - main
      - master
    paths:
      - "atlasvpn/**"
      - "ui/**"
      - "scripts/**"
      - "Logos/**"
      - "requirements.txt"
      - "Dockerfile"
      - "Dockerfile.ui"
      - "docker-entrypoint.sh"
      - "docker-compose.yml"
      - "deploy/**"
      - ".github/workflows/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ui:
    name: UI (TypeScript + Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Compilar
        run: npm run build

      - name: Comprobar artefactos generados
        working-directory: .
        run: |
          set -euo pipefail
          test -f atlasvpn/static/web/index.html
          test -d atlasvpn/static/web/assets

  python:
    name: API (Python)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Verificar sintaxis del paquete
        run: python -m compileall -q atlasvpn

  docker:
    name: Docker (build sin deploy)
    runs-on: ubuntu-latest
    needs: [ui, python]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: tunnels.json para build
        run: |
          set -euo pipefail
          if [[ -f scripts/tunnels.json ]]; then
            exit 0
          fi
          if [[ -f scripts/tunnels.example.json ]]; then
            cp scripts/tunnels.example.json scripts/tunnels.json
          else
            printf '%s\n' '{"meta":{"created_by":"ci"},"sites":{}}' > scripts/tunnels.json
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build imágenes (Compose)
        env:
          ATLASVPN_API_IMAGE: atlasvpn-api
          ATLASVPN_UI_IMAGE: atlasvpn-ui
          ATLASVPN_TAG: ci-${{ github.sha }}
          ATLASVPN_PUBLIC_API_URL: http://127.0.0.1:8765
        run: docker compose -f docker-compose.yml build
